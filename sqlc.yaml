version: "2"
overrides:
  go:
    overrides:
      - db_type: "uuid"
        nullable: true
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
          pointer: true
      - db_type: "uuid"
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"

sql:
  - schema: "./migrations"
    queries: "./queries/"
    engine: "postgresql"
    gen:
      go:
        out: "./internal/pkg/sqlc"
        package: "sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        omit_unused_structs: true
