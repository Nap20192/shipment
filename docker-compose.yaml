services:
    postgres:
        image: postgres:latest
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: shipment
        volumes:
            - db_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 5s
            timeout: 5s
            retries: 6

    migrator:
        image: migrate/migrate
        command: [ "-path", "/migrations", "-database", "postgres://postgres:postgres@postgres:5432/shipment?sslmode=disable", "up" ]
        volumes:
            - ./migrations:/migrations:ro
        depends_on:
            - postgres

volumes:
    db_data:
